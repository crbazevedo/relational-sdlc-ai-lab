name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Data is reproducible (no drift)
        run: |
          python data/fixtures/build_fixtures.py
          python data/synth/build_synth.py --data-only
          if [ -n "$(git status --porcelain -- data/)" ]; then
            echo "::error::generated data drifted; commit the regenerated files"
            git status --porcelain -- data/
            exit 1
          fi

      - name: Validate substrate (schema + provenance + leakage)
        run: relsdlc validate data

      - name: Benchmark smoke (no leakage)
        run: relsdlc bench

      - name: Ablation smoke (relation supervision path)
        run: relsdlc ablation

      - name: Tests
        run: pytest -q
